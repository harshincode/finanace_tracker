<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | MyFinanceTracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <div class="login-box">
      <div class="logo bounce-in">💰 <span>MyFinanceTracker</span></div>

      <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required class="input" />
        <input type="password" id="password" placeholder="Password" required class="input" />
        <button type="submit" class="btn">Login</button>
      </form>

      <p class="signup-text">Don't have an account? <a href="{{ url_for('signup_page') }}">Sign Up</a></p>
      <div id="message"></div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
